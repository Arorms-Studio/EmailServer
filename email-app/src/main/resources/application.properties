spring.application.name=EmailServer
server.port=8081

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/email_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.mail.host=127.0.0.1
spring.mail.port=25
spring.mail.username=
spring.mail.password=
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=10s
spring.mail.properties.mail.smtp.timeout=30s
spring.mail.properties.mail.smtp.writetimeout=30s

# spring.mail.properties.mail.smtp.from=${MAIL_DEFAULT_FROM:noreply@arorms.cn}

application.domain=arorms.cn

# ===== JWT =====
application.jwt.secret=${JWT_SECRET}
application.jwt.issuer=arorms-mail
application.jwt.audience=arorms-mail-client
application.jwt.access-ttl=PT15M
application.jwt.refresh-ttl=P7D

# ===== Refresh Cookie =====
application.jwt.refresh-cookie-name=REFRESH_TOKEN
application.jwt.refresh-cookie-path=/api/auth/refresh
application.jwt.refresh-cookie-secure=true
application.jwt.refresh-cookie-same-site=Strict
application.jwt.refresh-cookie-max-age=604800

# ===== CORS =====
application.cors.allowed-origins=https://mail.arorms.cn

# Log file
logging.file.name=spring-dev.log

# ===== Redis =====
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
application.redis.key-prefix=${REDIS_KEY_PREFIX:email-server:}

# ===== Mail (system sender) =====
application.mail.domain=${MAIL_DOMAIN:arorms.cn}
application.mail.default-from=${MAIL_DEFAULT_FROM:noreply}

# ===== Email verification =====
application.verification.code-ttl=PT5M
application.verification.code-length=6
application.verification.send-code-cooldown-per-email=PT1M
application.verification.send-code-quota-per-ip=5
application.verification.send-code-quota-window=PT1M